services:
  device-service-api:
    container_name: device-service-api
    build:
      context: .
      dockerfile: device_service/Dockerfile
    environment:
      - PORT=8000
      - NODE_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - device-status-logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smarthome-network
  agent-api:
    container_name: smarthome-api
    build:
      context: .
      dockerfile: ./src/Dockerfile
    environment:
      - PORT=8001
      - NODE_ENV=production
      - DEVICE_SERVICE_URL=http://device-service-api:8000
    ports:
      - "8001:8001"
    volumes:
      - agent-logs:/app/logs
    depends_on:
      device-service-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - smarthome-network
  smarthome-ui:
    container_name: smarthome-ui
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - agent-api
      - device-service-api
    networks:
      - smarthome-network
    environment:
      - DEVICE_SERVICE_URL=http://device-service-api:8000
      - AGENT_SERVICE_URL=http://agent-api:8001


volumes:
  device-status-logs:
  agent-logs:

networks:
  smarthome-network:
    name: smarthome-network
    driver: bridge